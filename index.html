<!DOCTYPE html>
<html>

<head>

<title>Smart Plantation</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#eaffea;
text-align:center;
}

/* HEADER */

header{
background:green;
color:white;
padding:15px;
font-size:22px;
}

/* WELCOME PAGE */

#welcome{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#tractor{
font-size:70px;
animation:move 4s linear infinite;
}

@keyframes move{
0%{transform:translateX(-150px)}
100%{transform:translateX(150px)}
}

/* BUTTON */

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:8px;
background:#2e7d32;
color:white;
cursor:pointer;
}

/* DASHBOARD */

#dashboard{
display:none;
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* MAPPING DASHBOARD */

#mappingDashboard{
display:none;
padding:20px;
}

/* MAP GRID */

#map{
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fill,45px);
gap:8px;
justify-content:center;
}

.spot{
font-size:30px;
}

</style>

</head>

<body>

<header>
🚜 Smart Plantation Monitor
</header>

<!-- WELCOME PAGE -->

<div id="welcome">

<h2>Welcome Farmer</h2>

<div id="tractor">🚜🌱🌱🌱</div>

<br>

<button onclick="startSystem()">Start Monitoring</button>

</div>

<!-- MAIN DASHBOARD -->

<div id="dashboard">

<h2>Machine Dashboard</h2>

<div class="cards">

<div class="card">
🌱 Planted
<h2 id="planted">0</h2>
</div>

<div class="card">
❌ Missed
<h2 id="missed">0</h2>
</div>

<div class="card">
🚜 Speed
<h2 id="speed">0</h2>
</div>

<div class="card">
📏 Distance
<h2 id="distance">0</h2>
</div>

</div>

<br>

<button onclick="openMapping()">🗺 Open Live Plantation Mapping</button>

</div>

<!-- MAPPING DASHBOARD -->

<div id="mappingDashboard">

<h2>🌾 Live Plantation Mapping</h2>

<button onclick="closeMapping()">⬅ Back</button>

<div id="map"></div>

</div>

<!-- FIREBASE SCRIPT -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey:"AIzaSyAzkcg1wzQTo2B7vQdcahtHAM2YBPn9WSY",

databaseURL:"https://planting-77ce1-default-rtdb.asia-southeast1.firebasedatabase.app"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* PAGE NAVIGATION */

window.startSystem=function(){

document.getElementById("welcome").style.display="none";
document.getElementById("dashboard").style.display="block";

}

window.openMapping=function(){

document.getElementById("dashboard").style.display="none";
document.getElementById("mappingDashboard").style.display="block";

}

window.closeMapping=function(){

document.getElementById("mappingDashboard").style.display="none";
document.getElementById("dashboard").style.display="block";

}

/* PLANTED */

onValue(ref(db,"plant/count"),(snap)=>{
document.getElementById("planted").innerText=snap.val()||0;
});

/* MISSED */

onValue(ref(db,"plant/missed"),(snap)=>{
document.getElementById("missed").innerText=snap.val()||0;
});

/* SPEED */

onValue(ref(db,"plant/speed"),(snap)=>{
document.getElementById("speed").innerText=snap.val()||0;
});

/* DISTANCE */

onValue(ref(db,"plant/distance"),(snap)=>{
document.getElementById("distance").innerText=snap.val()||0;
});

/* PLANTATION MAP */

onValue(ref(db,"plant/map"),(snapshot)=>{

const data=snapshot.val()||{};
const container=document.getElementById("map");

container.innerHTML="";

const positions=Object.keys(data)
.map(Number)
.sort((a,b)=>a-b);

positions.forEach(pos=>{

const span=document.createElement("span");
span.className="spot";

if(data[pos]==1){
span.innerHTML="🌱";
}else{
span.innerHTML="❌";
}

container.appendChild(span);

});

});

</script>

</body>
</html>
