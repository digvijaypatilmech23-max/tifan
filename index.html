<!DOCTYPE html>
<html>
<head>
  <title>Krushisarthi Plant Mapping</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #eaffea;
      text-align: center;
    }

    h1 {
      background: green;
      color: white;
      padding: 12px;
    }

    #map {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
      width: 90%;
      margin-left: auto;
      margin-right: auto;
    }

    .dot {
      width: 20px;
      height: 20px;
      margin: 5px;
      border-radius: 50%;
    }

    .green { background: green; }
    .red { background: red; }
  </style>
</head>

<body>

<h1>🌱 Krushisarthi Live Plant Map</h1>

<div id="map"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAo2-BGrCrO3N8pjTqaoAPH34_o6-Eueyo",
    databaseURL: "https://tifan-66317-default-rtdb.asia-southeast1.firebasedatabase.app/"
  };

  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const mapDiv = document.getElementById("map");

  // 🔥 IMPORTANT: track previous value to avoid duplicates
  let lastStatus = "";

  db.ref("/transplanter/status").on("value", (snapshot) => {
    const status = snapshot.val();

    // Only add new bubble when status changes
    if (status !== lastStatus) {

      let dot = document.createElement("div");
      dot.classList.add("dot");

      if (status === "Planted") {
        dot.classList.add("green");
      } else {
        dot.classList.add("red");
      }

      mapDiv.appendChild(dot);

      lastStatus = status;
    }
  });
</script>

</body>
</html>
